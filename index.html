<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result</title>
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- External CSS Link -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Canvas for Confetti Effect on Passing -->
    <canvas id="confetti-canvas"></canvas>

    <div class="result-container">
        <!-- Main Result Card -->
        <div class="result-card">
            <h1 class="title">Quiz Completed!</h1>
            
            <!-- Animated Circular Progress Bar -->
            <div class="progress-container">
                <svg class="progress-ring" width="160" height="160">
                    <circle class="progress-ring__background" stroke="#e6e6e6" stroke-width="12" fill="transparent" r="70" cx="80" cy="80"/>
                    <circle class="progress-ring__circle" stroke="#4f46e5" stroke-width="12" fill="transparent" r="70" cx="80" cy="80"/>
                </svg>
                <div class="percentage-display" id="percentage-text">0%</div>
            </div>

            <!-- Dynamic Performance Message -->
            <h2 id="performance-message" class="message">Calculating...</h2>
            
            <hr class="divider">

            <!-- Detailed Stats Grid -->
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">Your Score</span>
                    <span class="stat-value" id="score-text">0/0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Status</span>
                    <span class="stat-value status-badge" id="status-badge">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">High Score</span>
                    <span class="stat-value" id="high-score-text">0%</span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="btn-group">
                <button class="btn btn-primary" id="retry-btn">Retry Quiz</button>
                <button class="btn btn-secondary" id="home-btn">Back to Home</button>
            </div>
        </div>
    </div>

    <!-- External JavaScript Link -->
    <script src="script.js"></script>
</body>
</html>
