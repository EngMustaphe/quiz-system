<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Knowledge Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Mulish:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #0c0f1a;
  --surface:   #141828;
  --surface2:  #1c2236;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.13);
  --gold:      #c9a84c;
  --gold-lt:   #e8c97a;
  --gold-dk:   #9a7530;
  --text:      #eef0f6;
  --muted:     #7a82a0;
  --muted2:    #4a5070;
  --correct:   #00ec5b;
  --wrong:     #ff004c;
  --correct-bg:rgba(46,204,113,0.1);
  --wrong-bg:  rgba(231,76,60,0.1);
  --radius:    14px;
  --radius-sm: 8px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body {
  font-family: 'Mulish', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 3rem 1rem 5rem;
  position: relative;
  overflow-x: hidden;
}

/* Background decoration */
body::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 800px;
  background: radial-gradient(ellipse at center, rgba(201,168,76,0.07) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -300px; right: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(ellipse at center, rgba(99,130,220,0.06) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

.quiz-wrap {
  width: 100%;
  max-width: 640px;
  position: relative;
  z-index: 1;
  animation: fadeUp 0.6s ease both;
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(24px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── Header ── */
.quiz-header {
  text-align: center;
  margin-bottom: 2.5rem;
}

.quiz-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.85rem;
}
.quiz-eyebrow::before,
.quiz-eyebrow::after {
  content: '';
  display: block;
  width: 28px;
  height: 1px;
  background: var(--gold-dk);
}

.quiz-title {
  font-family: 'Playfair Display', serif;
  font-size: 2.8rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.1;
  margin-bottom: 0.6rem;
  letter-spacing: -0.01em;
}

.quiz-title span { color: var(--gold); }

.quiz-subtitle {
  font-size: 13px;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 0.04em;
}

/* ── Progress ── */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 1.75rem;
}

.progress-track {
  flex: 1;
  height: 3px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dk), var(--gold));
  border-radius: 99px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

.progress-count {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  white-space: nowrap;
  min-width: 60px;
  text-align: right;
  letter-spacing: 0.04em;
}

/* ── Question card ── */
.question-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 2rem 2rem 1.75rem;
  margin-bottom: 1rem;
  position: relative;
  overflow: hidden;
}

.question-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.6;
}

.q-cat {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold);
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.2);
  padding: 4px 12px;
  border-radius: 99px;
  margin-bottom: 1.1rem;
}

.q-number {
  font-family: 'Playfair Display', serif;
  font-size: 11px;
  color: var(--muted2);
  letter-spacing: 0.06em;
  margin-bottom: 0.5rem;
}

.q-text {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem;
  font-weight: 400;
  line-height: 1.6;
  color: var(--text);
}

/* ── Options ── */
.options-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 1rem;
}

.option-btn {
  width: 100%;
  text-align: left;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 1rem 1.1rem;
  font-family: 'Mulish', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}

.option-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(201,168,76,0.04) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.2s;
}

.option-btn:hover:not(:disabled) {
  border-color: rgba(201,168,76,0.35);
  background: var(--surface2);
  transform: translateX(4px);
}
.option-btn:hover:not(:disabled)::after { opacity: 1; }

.option-btn:disabled { cursor: default; }

.opt-letter {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  background: var(--surface2);
  border: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  color: var(--muted);
  letter-spacing: 0.02em;
  transition: all 0.2s;
}

.opt-text { flex: 1; line-height: 1.45; }

.opt-icon {
  font-size: 16px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.2s;
}

/* States */
.option-btn.correct {
  border-color: rgba(46,204,113,0.5);
  background: var(--correct-bg);
}
.option-btn.correct .opt-letter {
  background: var(--correct);
  border-color: var(--correct);
  color: #fff;
}
.option-btn.correct .opt-icon { opacity: 1; color: var(--correct); }

.option-btn.wrong {
  border-color: rgba(231,76,60,0.5);
  background: var(--wrong-bg);
}
.option-btn.wrong .opt-letter {
  background: var(--wrong);
  border-color: var(--wrong);
  color: #fff;
}
.option-btn.wrong .opt-icon { opacity: 1; color: var(--wrong); }

.option-btn.dimmed { opacity: 0.3; }

/* ── Feedback ── */
.feedback-box {
  display: none;
  border-radius: var(--radius-sm);
  padding: 0.9rem 1.1rem;
  font-size: 13.5px;
  font-weight: 300;
  line-height: 1.65;
  color: var(--muted);
  margin-bottom: 1rem;
  border-left: 2px solid var(--gold-dk);
  background: rgba(201,168,76,0.04);
}
.feedback-box.visible { display: block; animation: fadeIn 0.3s ease; }
.feedback-box.correct-fb { border-color: var(--correct); background: var(--correct-bg); color: #a8f0c6; }
.feedback-box.wrong-fb   { border-color: var(--wrong);   background: var(--wrong-bg);   color: #f5b8b2; }

.fb-label {
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

@keyframes fadeIn {
  from { opacity:0; transform: translateY(6px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── Nav ── */
.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 0.5rem;
}

.nav-hint {
  font-size: 12px;
  color: var(--muted2);
  font-weight: 300;
}

.next-btn {
  font-family: 'Mulish', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.7rem 1.75rem;
  border-radius: 99px;
  background: linear-gradient(135deg, var(--gold-dk), var(--gold));
  color: #0c0f1a;
  border: none;
  cursor: pointer;
  display: none;
  align-items: center;
  gap: 8px;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 24px rgba(201,168,76,0.25);
}
.next-btn.visible { display: flex; animation: fadeIn 0.3s ease; }
.next-btn:hover   { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 30px rgba(201,168,76,0.35); }
.next-btn:active  { transform: scale(0.97); }

/* ── Score dots ── */
.score-dots {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.score-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  transition: all 0.3s ease;
}
.score-dot.hit   { background: var(--correct); border-color: var(--correct); box-shadow: 0 0 6px rgba(46,204,113,0.5); }
.score-dot.miss  { background: var(--wrong);   border-color: var(--wrong); }
.score-dot.active{ border-color: var(--gold); box-shadow: 0 0 6px rgba(201,168,76,0.5); }

/* ── Result ── */
.result-card {
  display: none;
  text-align: center;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 3rem 2rem;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.5s ease both;
}
.result-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.result-card.visible { display: block; }

.result-trophy {
  font-size: 3.5rem;
  margin-bottom: 1rem;
  display: block;
  animation: pop 0.5s cubic-bezier(.36,.07,.19,.97) 0.2s both;
}
@keyframes pop {
  0%   { transform: scale(0.5); opacity: 0; }
  80%  { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}

.score-big {
  font-family: 'Playfair Display', serif;
  font-size: 5rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 0.15rem;
}

.score-denom {
  font-size: 14px;
  color: var(--muted);
  font-weight: 300;
  margin-bottom: 1.25rem;
  letter-spacing: 0.06em;
}

.result-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
}

.result-msg {
  font-size: 14px;
  font-weight: 300;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 2rem;
  max-width: 380px;
  margin-left: auto;
  margin-right: auto;
}

.result-stats {
  display: flex;
  justify-content: center;
  gap: 2rem;
  margin-bottom: 2rem;
  padding: 1.25rem 1.5rem;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

.stat-item { text-align: center; }
.stat-value {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text);
  display: block;
}
.stat-value.green { color: var(--correct); }
.stat-value.red   { color: var(--wrong); }
.stat-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
}

.restart-btn {
  font-family: 'Mulish', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.75rem 2.25rem;
  border-radius: 99px;
  background: linear-gradient(135deg, var(--gold-dk), var(--gold));
  color: #0c0f1a;
  border: none;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 24px rgba(201,168,76,0.25);
}
.restart-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 30px rgba(201,168,76,0.35); }

/* ── Divider ── */
.gold-divider {
  width: 40px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dk), transparent);
  margin: 1rem auto;
}
</style>
</head>
<body>

<div class="quiz-wrap">

  <!-- Header -->
  <div class="quiz-header">
    <div class="quiz-eyebrow">General Knowledge</div>
    <h1 class="quiz-title">The <span>Ultimate</span> Quiz</h1>
    <p class="quiz-subtitle">10 questions &nbsp;·&nbsp; multiple choice &nbsp;·&nbsp; instant feedback</p>
  </div>

  <!-- Main quiz -->
  <div id="quizMain">

    <!-- Score dots tracker -->
    <div class="score-dots" id="scoreDots"></div>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:10%"></div>
      </div>
      <div class="progress-count" id="progressCount">1 / 10</div>
    </div>

    <!-- Question -->
    <div class="question-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
        <span class="q-cat" id="qCat">Science</span>
        <span class="q-number" id="qNum">Question 01</span>
      </div>
      <p class="q-text" id="qText">Loading question…</p>
    </div>

    <!-- Options -->
    <div class="options-grid" id="optionsGrid"></div>

    <!-- Feedback -->
    <div class="feedback-box" id="feedbackBox">
      <div class="fb-label" id="fbLabel">Correct</div>
      <div id="fbText"></div>
    </div>

    <!-- Nav -->
    <div class="nav-row">
      <span class="nav-hint" id="navHint">Select an answer to continue</span>
      <button class="next-btn" id="nextBtn">
        Continue &nbsp;›
      </button>
    </div>

  </div><!-- /quizMain -->

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <span class="result-trophy" id="resultTrophy">🏆</span>
    <div class="score-big" id="scoreBig">0</div>
    <div class="score-denom" id="scoreDenom">out of 10 correct</div>
    <div class="gold-divider"></div>
    <h2 class="result-title" id="resultTitle">Well done!</h2>
    <p class="result-msg" id="resultMsg"></p>
    <div class="result-stats">
      <div class="stat-item">
        <span class="stat-value green" id="statCorrect">0</span>
        <span class="stat-label">Correct</span>
      </div>
      <div class="stat-item">
        <span class="stat-value red" id="statWrong">0</span>
        <span class="stat-label">Wrong</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statPct">0%</span>
        <span class="stat-label">Score</span>
      </div>
    </div>
    <button class="restart-btn" onclick="restart()">Play Again</button>
  </div>

</div><!-- /quiz-wrap -->

<script>
const questions = [
  { category:"Science",    text:"What is the chemical symbol for gold?",                                        options:["Go","Gd","Au","Ag"],             answer:2, explanation:"Au comes from the Latin 'Aurum'. Silver is Ag, Gadolinium is Gd." },
  { category:"Geography",  text:"Which country has the most natural lakes in the world?",                       options:["Russia","Canada","USA","Brazil"], answer:1, explanation:"Canada holds ~879,800 lakes — about 60% of the world's total." },
  { category:"History",    text:"In which year did World War II end?",                                          options:["1943","1944","1945","1946"],       answer:2, explanation:"Germany surrendered May 8 and Japan on September 2, 1945." },
  { category:"Science",    text:"How many bones does an adult human body have?",                                options:["196","206","216","226"],           answer:1, explanation:"Adults have 206 bones. Babies start with ~270, which fuse over time." },
  { category:"Technology", text:"What does HTTP stand for?",                                                    options:["HyperText Transfer Protocol","High-Tech Transfer Protocol","HyperText Transmission Program","Hyper Transfer Text Protocol"], answer:0, explanation:"HyperText Transfer Protocol — the foundation of Web communication." },
  { category:"Astronomy",  text:"Which planet is known as the Red Planet?",                                     options:["Venus","Saturn","Jupiter","Mars"], answer:3, explanation:"Mars's iron-oxide surface gives it a distinctive reddish appearance." },
  { category:"Language",   text:"How many letters are in the English alphabet?",                                options:["24","25","26","27"],               answer:2, explanation:"26 letters, A to Z, evolved from the Latin alphabet." },
  { category:"Math",       text:"What is the value of π (pi) rounded to two decimal places?",                  options:["3.12","3.14","3.16","3.18"],       answer:1, explanation:"Pi ≈ 3.14159… → 3.14. It's the ratio of circumference to diameter." },
  { category:"Art",        text:"Who painted the Mona Lisa?",                                                  options:["Michelangelo","Van Gogh","Leonardo da Vinci","Raphael"], answer:2, explanation:"Leonardo da Vinci painted it between 1503–1519. It hangs in the Louvre, Paris." },
  { category:"Science",    text:"What gas do plants absorb during photosynthesis?",                             options:["Oxygen","Nitrogen","Carbon Dioxide","Hydrogen"], answer:2, explanation:"Plants absorb CO₂ and convert it into glucose and oxygen using sunlight." }
];

const letters = ['A','B','C','D'];
let current = 0, score = 0, wrong = 0, answered = false;
const results = [];

function buildDots() {
  const wrap = document.getElementById('scoreDots');
  wrap.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'score-dot' + (i === 0 ? ' active' : '');
    d.id = `dot${i}`;
    wrap.appendChild(d);
  });
}

function loadQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('qCat').textContent = q.category;
  document.getElementById('qNum').textContent = `Question ${String(current+1).padStart(2,'0')}`;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('progressFill').style.width = `${((current+1)/questions.length)*100}%`;
  document.getElementById('progressCount').textContent = `${current+1} / ${questions.length}`;
  document.getElementById('navHint').textContent = 'Select an answer to continue';

  // dots
  questions.forEach((_,i) => {
    const d = document.getElementById(`dot${i}`);
    d.classList.remove('active');
    if (i === current) d.classList.add('active');
  });

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span class="opt-text">${opt}</span><span class="opt-icon" aria-hidden="true"></span>`;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box';
  document.getElementById('nextBtn').className = 'next-btn';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const isCorrect = idx === q.answer;
  isCorrect ? score++ : wrong++;
  results.push(isCorrect);

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    const icon = btn.querySelector('.opt-icon');
    if (i === q.answer) {
      btn.classList.add('correct');
      icon.textContent = '✓';
    } else if (i === idx && !isCorrect) {
      btn.classList.add('wrong');
      icon.textContent = '✗';
    } else {
      btn.classList.add('dimmed');
    }
  });

  // dot
  const dot = document.getElementById(`dot${current}`);
  dot.classList.remove('active');
  dot.classList.add(isCorrect ? 'hit' : 'miss');

  // feedback
  const fb   = document.getElementById('feedbackBox');
  const lbl  = document.getElementById('fbLabel');
  const txt  = document.getElementById('fbText');
  lbl.textContent = isCorrect ? '✓ Correct!' : '✗ Incorrect';
  txt.textContent  = q.explanation;
  fb.className = `feedback-box visible ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;

  document.getElementById('navHint').textContent = '';
  document.getElementById('nextBtn').className = 'next-btn visible';
}

function nextQuestion() {
  current++;
  if (current >= questions.length) showResult();
  else loadQuestion();
}

function showResult() {
  document.getElementById('quizMain').style.display = 'none';
  const rc = document.getElementById('resultCard');
  rc.className = 'result-card visible';

  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('scoreBig').textContent = score;
  document.getElementById('scoreDenom').textContent = `out of ${questions.length} correct`;
  document.getElementById('statCorrect').textContent = score;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statPct').textContent = pct + '%';

  let trophy, title, msg;
  if (pct === 100) { trophy='🏆'; title='Flawless Victory!'; msg='A perfect score — every single answer correct. You are exceptional.'; }
  else if (pct >= 80) { trophy='🥇'; title='Excellent Work!'; msg=`${score} out of ${questions.length} correct. You clearly know your stuff.`; }
  else if (pct >= 60) { trophy='🥈'; title='Good Job!'; msg=`${score} out of ${questions.length} correct. Solid performance — keep it up!`; }
  else if (pct >= 40) { trophy='🥉'; title='Not Bad!'; msg=`${score} out of ${questions.length} correct. A bit more practice and you'll ace it.`; }
  else { trophy='📚'; title='Keep Learning!'; msg=`${score} out of ${questions.length} correct. Every genius started somewhere — try again!`; }

  document.getElementById('resultTrophy').textContent = trophy;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;
}

function restart() {
  current = 0; score = 0; wrong = 0; answered = false; results.length = 0;
  document.getElementById('quizMain').style.display = '';
  document.getElementById('resultCard').className = 'result-card';
  buildDots();
  loadQuestion();
}
